<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rahma Media portfolio — selected brand films, campaigns, and digital work."
    />
    <title>Portfolio | Rahma Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#102C57",
              paper: "#F8F0E5",
              ember: "#DAC0A3",
              citrus: "#EADBC8",
              tide: "#DAC0A3",
            },
            fontFamily: {
              display: ["Gelasio", "Georgia", "Times New Roman", "serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="portfolio-page font-body text-ink antialiased">
    <header class="fixed inset-x-0 top-0 z-50" data-header>
      <nav class="main-nav content-container flex items-center justify-between py-5" aria-label="Portfolio navigation">
        <a href="/" class="group flex items-center" aria-label="Rahma Media home">
          <span class="logo-wordmark transition">
            Rahma Media
          </span>
        </a>

        <div class="hidden items-center gap-8 px-6 py-3 text-sm font-medium lg:flex">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/portfolio">Portfolio</a>
          <a class="nav-link" href="/#about">About</a>
          <a class="nav-link" href="/#services">Services</a>
          <a class="nav-link" href="/#process">Process</a>
          <a class="nav-link" href="/#contact">Contact</a>
        </div>

        <!-- Desktop: language toggle + CTA -->
        <div class="nav-actions hidden lg:flex">
          <div class="lang-toggle" data-lang-toggle role="group" aria-label="Language selection">
            <button class="lang-opt" data-lang="ar" aria-pressed="false" aria-label="Arabic">
              <span class="lang-flag" aria-hidden="true">🇸🇦</span>
              <span class="lang-label">AR</span>
            </button>
            <button class="lang-opt" data-lang="en" aria-pressed="true" aria-label="English">
              <span class="lang-flag" aria-hidden="true">🇺🇸</span>
              <span class="lang-label">EN</span>
            </button>
            <span class="lang-thumb" aria-hidden="true"></span>
          </div>
          <a
            href="/#contact"
            class="nav-cta rounded-full border px-5 py-2.5 text-sm font-semibold transition inline-flex"
          >
            Start a project
          </a>
        </div>

        <!-- Mobile: language toggle + hamburger -->
        <div class="flex items-center gap-2 lg:hidden">
          <div class="lang-toggle lang-toggle-sm" data-lang-toggle role="group" aria-label="Language selection">
            <button class="lang-opt" data-lang="ar" aria-pressed="false" aria-label="Arabic">
              <span class="lang-flag" aria-hidden="true">🇸🇦</span>
              <span class="lang-label">AR</span>
            </button>
            <button class="lang-opt" data-lang="en" aria-pressed="true" aria-label="English">
              <span class="lang-flag" aria-hidden="true">🇺🇸</span>
              <span class="lang-label">EN</span>
            </button>
            <span class="lang-thumb" aria-hidden="true"></span>
          </div>
          <button
            class="grid h-10 w-10 place-items-center rounded-full bg-transparent"
            type="button"
            aria-label="Open menu"
            aria-expanded="false"
            data-menu-button
          >
            <span class="menu-icon"></span>
          </button>
        </div>
      </nav>

      <div class="hidden border-t border-paper/10 bg-ink/96 py-6 text-paper backdrop-blur-xl lg:hidden" data-mobile-menu>
        <div class="content-container grid gap-5 text-xl font-medium">
          <a href="/">Home</a>
          <a href="/portfolio">Portfolio</a>
          <a href="/#about">About</a>
          <a href="/#services">Services</a>
          <a href="/#process">Process</a>
          <a href="/#contact">Contact</a>
        </div>
      </div>
    </header>

    <main>
      <section class="portfolio-showcase" data-nav-theme="light">
        <div class="content-container">
          <div class="portfolio-title-wrap">
            <h1 class="portfolio-title">Portfolio</h1>
          </div>

          <div class="portfolio-card-grid" data-reveal>
            <a class="portfolio-card" href="/portfolio-detail?project=cafe" aria-label="Open Café portfolio project">
              <div class="portfolio-card-img-wrap">
                <img
                  src="./assets/hayaticafe.jpg"
                  alt="Hayati Café"
                />
              </div>
              <span class="portfolio-card-copy">
                <span>Café</span>
              </span>
            </a>

            <a class="portfolio-card" href="/portfolio-detail?project=clinic" aria-label="Open Clinic portfolio project">
              <div class="portfolio-card-img-wrap">
                <img
                  src="./assets/hayaticlinic.jpg"
                  alt="Hayati Clinic"
                />
              </div>
              <span class="portfolio-card-copy">
                <span>Clinic</span>
              </span>
            </a>

            <a class="portfolio-card" href="/portfolio-detail?project=salon" aria-label="Open Salon portfolio project">
              <div class="portfolio-card-img-wrap">
                <img
                  src="./assets/hayatisalon.jpg"
                  alt="Hayati Salon"
                />
              </div>
              <span class="portfolio-card-copy">
                <span>Salon</span>
              </span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
